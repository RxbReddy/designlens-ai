name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'teardown-agent/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'teardown-agent/frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: teardown-agent/frontend

      - name: Build Next.js Static Export
        run: npm run build
        working-directory: teardown-agent/frontend
        env:
          NEXT_PUBLIC_API_URL: "https://teardown-agent-184347428779.us-east1.run.app"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/184347428779/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'firebase-deployer@adkcourse-500521.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project adkcourse-500521
        working-directory: teardown-agent/frontend
